[package]
name = "str0m_test_datachannels"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

[target.'cfg(not(target_os = "linux"))'.dependencies]
str0m = "0.20"

[target.'cfg(target_os = "linux")'.dependencies]
str0m = { version = "0.20", default-features = false, features = ["openssl-dimpl", "vendored"] }